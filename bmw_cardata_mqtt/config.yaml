name: "BMW CarData MQTT Bridge"
description: "BMW CarData MQTT Bridge mit OAuth2-Setup, Streaming-Status, verbesserter Reconnect-Logik und Ingress-Streaming-Fix."
version: "3.2.17"
slug: "bmw_cardata_mqtt"
init: false

arch:
  - aarch64
  - amd64
  - armv7

homeassistant_api: false
hassio_api: false

ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:car-connected"
panel_title: "BMW CarData"

# MQTT configuration before startup
# VIN and Client-ID are set via the web UI, not here.
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  bmw_prefix: "bmw/"
  stream_mode: "always_on"
  active_window: ""
  log_level: "info"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  bmw_prefix: str
  stream_mode: "list(always_on|conservative)"
  active_window: str
  log_level: "list(debug|info|warning|error)"

map:
  - data:rw
