name: "BMW CarData MQTT Bridge"
description: "BMW CarData → Home Assistant MQTT Discovery. OAuth2-Setup, automatische Fahrzeugerkennung und Token-Refresh direkt im Addon."
version: "3.0.1"
slug: "bmw_cardata_mqtt"
init: false

arch:
  - aarch64
  - amd64
  - armv7

homeassistant_api: false
hassio_api: false

ingress: true
ingress_port: 8099
panel_icon: "mdi:car-connected"
panel_title: "BMW CarData"

# ── MQTT-Konfiguration (vorab, vor dem Start) ──────────────────────────────
# VIN und Client-ID werden über das Webinterface gesetzt – nicht hier.
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  bmw_prefix: "bmw/"
  log_level: "info"

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  bmw_prefix: str
  log_level: "list(debug|info|warning|error)"

map:
  - data:rw
